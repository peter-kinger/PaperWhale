[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出设置
addopts = -v --tb=short

# 标记
markers =
    slow: 慢速测试（涉及真实文件或网络）
    integration: 集成测试
    unit: 单元测试

# 忽略
norecursedirs = .git .tox dist build *.egg node_modules input_pdfs output_docs summary_docs